{% extends "base.html" %}

{% block title %}Directories - PDF Search{% endblock %}

{% block content %}
<div class="container">
    <h1>Directory Management</h1>

    <!-- Add Directory Form -->
    <div class="section">
        <h2>Add Directory</h2>
        <form id="add-directory-form" class="directory-form">
            <div class="form-group">
                <label for="directory-path">Directory Path:</label>
                <input 
                    type="text" 
                    id="directory-path" 
                    name="path" 
                    placeholder="/absolute/path/to/directory" 
                    class="form-input"
                    required>
            </div>
            <div class="form-group">
                <label for="directory-name">Display Name:</label>
                <input 
                    type="text" 
                    id="directory-name" 
                    name="name" 
                    placeholder="My Documents" 
                    class="form-input"
                    required>
            </div>
            <button type="submit" class="btn btn-primary">Add Directory</button>
        </form>
        <div id="add-error" class="error" style="display: none;"></div>
    </div>

    <!-- Directory List -->
    <div class="section">
        <h2>Registered Directories</h2>
        <div id="directories-list" 
             hx-get="/api/v1/directories" 
             hx-trigger="load, refreshList from:body"
             hx-swap="innerHTML">
            <div class="loading">Loading directories...</div>
        </div>
    </div>
</div>

<script>
    // Handle add directory form submission
    document.getElementById('add-directory-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const form = e.target;
        const path = form.querySelector('#directory-path').value;
        const name = form.querySelector('#directory-name').value;
        const errorDiv = document.getElementById('add-error');

        try {
            const response = await fetch('/api/v1/directories', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ path, name }),
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.detail || 'Failed to add directory');
            }

            // Clear form and refresh list
            form.reset();
            errorDiv.style.display = 'none';
            document.body.dispatchEvent(new Event('refreshList'));
        } catch (error) {
            errorDiv.textContent = error.message;
            errorDiv.style.display = 'block';
        }
    });

    // Handle delete directory
    document.body.addEventListener('click', async function(e) {
        if (e.target.classList.contains('delete-btn')) {
            if (!confirm('Are you sure you want to delete this directory? Documents will be kept but unlinked.')) {
                return;
            }

            const directoryId = e.target.dataset.directoryId;
            try {
                const response = await fetch(`/api/v1/directories/${directoryId}`, {
                    method: 'DELETE',
                });

                if (!response.ok) {
                    throw new Error('Failed to delete directory');
                }

                document.body.dispatchEvent(new Event('refreshList'));
            } catch (error) {
                alert('Error deleting directory: ' + error.message);
            }
        }
    });

    // Handle sync directory
    document.body.addEventListener('click', async function(e) {
        if (e.target.classList.contains('sync-btn')) {
            const directoryId = e.target.dataset.directoryId;
            const btn = e.target;
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Syncing...';

            try {
                const response = await fetch(`/api/v1/directories/${directoryId}/sync`, {
                    method: 'POST',
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to sync directory');
                }

                const result = await response.json();
                alert(`Sync complete: ${result.message}`);
                document.body.dispatchEvent(new Event('refreshList'));
            } catch (error) {
                alert('Error syncing directory: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }
    });

    // Handle ingest directory
    document.body.addEventListener('click', async function(e) {
        if (e.target.classList.contains('ingest-btn')) {
            const directoryId = e.target.dataset.directoryId;
            const limit = prompt('Enter number of PDFs to ingest (leave empty for all):');
            
            if (limit === null) return; // User cancelled

            const limitNum = limit.trim() === '' ? null : parseInt(limit.trim());
            if (limitNum !== null && (isNaN(limitNum) || limitNum < 1)) {
                alert('Please enter a valid positive number');
                return;
            }

            const btn = e.target;
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Ingesting...';

            try {
                const response = await fetch(`/api/v1/directories/${directoryId}/ingest`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ limit: limitNum }),
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to ingest directory');
                }

                const result = await response.json();
                alert(`Ingestion complete: ${result.message}`);
                document.body.dispatchEvent(new Event('refreshList'));
            } catch (error) {
                alert('Error ingesting directory: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }
    });
</script>

<style>
    .section {
        margin-bottom: 2rem;
        padding-bottom: 2rem;
        border-bottom: 1px solid #e5e7eb;
    }

    .section:last-child {
        border-bottom: none;
    }

    .section h2 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 1rem;
        color: #1f2937;
    }

    .directory-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .form-group label {
        font-weight: 500;
        color: #374151;
    }

    .form-input {
        padding: 0.75rem 1rem;
        font-size: 1rem;
        border: 2px solid #e5e7eb;
        border-radius: 6px;
        transition: border-color 0.2s;
    }

    .form-input:focus {
        outline: none;
        border-color: #2563eb;
    }

    .btn {
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-primary {
        background-color: #2563eb;
        color: white;
    }

    .btn-primary:hover:not(:disabled) {
        background-color: #1d4ed8;
    }

    .btn-secondary {
        background-color: #6b7280;
        color: white;
    }

    .btn-secondary:hover:not(:disabled) {
        background-color: #4b5563;
    }

    .btn-danger {
        background-color: #dc2626;
        color: white;
    }

    .btn-danger:hover:not(:disabled) {
        background-color: #b91c1c;
    }

    .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    .directory-item {
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        padding: 1.5rem;
        margin-bottom: 1rem;
        background: white;
    }

    .directory-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        margin-bottom: 1rem;
    }

    .directory-info h3 {
        font-size: 1.125rem;
        font-weight: 600;
        color: #1f2937;
        margin-bottom: 0.5rem;
    }

    .directory-path {
        font-family: monospace;
        font-size: 0.875rem;
        color: #6b7280;
        word-break: break-all;
    }

    .directory-meta {
        display: flex;
        gap: 1rem;
        margin-top: 0.5rem;
        font-size: 0.875rem;
        color: #6b7280;
    }

    .status-badge {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        border-radius: 4px;
        font-size: 0.875rem;
        font-weight: 500;
    }

    .status-active {
        background-color: #d1fae5;
        color: #065f46;
    }

    .status-syncing {
        background-color: #dbeafe;
        color: #1e40af;
    }

    .status-error {
        background-color: #fee2e2;
        color: #991b1b;
    }

    .directory-actions {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
    }

    .empty-state {
        text-align: center;
        padding: 3rem;
        color: #6b7280;
    }
</style>
{% endblock %}
