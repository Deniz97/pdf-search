{% extends "base.html" %}

{% block title %}Chat - PDF Search{% endblock %}

{% block content %}
<div class="container">
    <h1>Chat with Documents</h1>

    <div class="chat-container">
        <div id="chat-messages" class="chat-messages">
            <div class="empty-state">
                <h2>Start a conversation</h2>
                <p>Ask questions about your uploaded documents.</p>
            </div>
        </div>

        <form id="chat-form" class="chat-input-container">
            <textarea 
                id="chat-input" 
                name="message"
                placeholder="Type your message... (Shift+Enter for new line)"
                class="chat-input"
                rows="1"></textarea>
            <button type="submit" class="send-button">Send</button>
        </form>
    </div>
</div>

<script>
    let messages = [];

    function addMessage(role, content) {
        const messagesDiv = document.getElementById('chat-messages');
        
        // Remove empty state if present
        const emptyState = messagesDiv.querySelector('.empty-state');
        if (emptyState) emptyState.remove();

        const messageDiv = document.createElement('div');
        messageDiv.className = `message message-${role}`;
        
        const roleDiv = document.createElement('div');
        roleDiv.className = 'message-role';
        roleDiv.textContent = role === 'user' ? 'You' : 'Assistant';
        
        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        contentDiv.textContent = content;
        
        messageDiv.appendChild(roleDiv);
        messageDiv.appendChild(contentDiv);

        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const message = input.value.trim();
        if (!message) return;

        // Add user message
        addMessage('user', message);
        messages.push({ role: 'user', content: message });
        input.value = '';
        input.disabled = true;

        // Show loading
        const messagesDiv = document.getElementById('chat-messages');
        addMessage('assistant', 'Thinking...');
        const loadingMsg = messagesDiv.lastElementChild;

        try {
            // Send request - server handles tool calls internally
            const response = await fetch('/api/v1/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages })
            });

            if (!response.ok) {
                const errorText = await response.text();
                let errorMsg = 'Chat failed';
                try {
                    const errorJson = JSON.parse(errorText);
                    errorMsg = errorJson.detail || errorMsg;
                } catch (e) {
                    errorMsg = errorText || errorMsg;
                }
                throw new Error(errorMsg);
            }

            const data = await response.json();
            console.log('Chat response:', data);

            // Remove loading message
            if (loadingMsg && loadingMsg.parentNode) {
                loadingMsg.remove();
            }

            // Display final assistant response
            const assistantContent = data.message?.content || '';
            if (assistantContent) {
                addMessage('assistant', assistantContent);
                messages.push({ role: 'assistant', content: assistantContent });
            } else {
                addMessage('assistant', 'No response received');
            }
        } catch (err) {
            const messagesDiv = document.getElementById('chat-messages');
            if (loadingMsg && loadingMsg.parentNode) {
                loadingMsg.remove();
            }
            console.error('Chat error:', err);
            addMessage('assistant', `Error: ${err.message || 'Unknown error occurred'}`);
        } finally {
            input.disabled = false;
            input.focus();
        }
    }

    document.getElementById('chat-form').addEventListener('submit', (e) => {
        e.preventDefault();
        sendMessage();
    });

    document.getElementById('chat-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
</script>
{% endblock %}
