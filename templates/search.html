{% extends "base.html" %}

{% block title %}Search - PDF Search{% endblock %}

{% block content %}
<div class="container">
    <h1>Search Documents</h1>

    <form hx-post="/api/v1/documents/search" 
          hx-target="#results" 
          hx-swap="innerHTML"
          hx-indicator="#loading"
          hx-headers='{"Content-Type": "application/json"}'
          class="search-form">
        <input 
            type="text" 
            name="query" 
            placeholder="Enter your search query..." 
            class="search-input"
            required
            minlength="1">
        <input type="hidden" name="top_k" value="10">
        <button type="submit" class="search-button">Search</button>
    </form>

    <div id="loading" class="htmx-indicator loading">Searching...</div>

    <div id="results"></div>
</div>

<script>
    // Handle form submission with proper JSON
    document.querySelector('form').addEventListener('htmx:configRequest', function(evt) {
        const form = evt.detail.elt;
        const query = form.querySelector('input[name="query"]').value;
        const topK = parseInt(form.querySelector('input[name="top_k"]').value);
        
        evt.detail.headers['Content-Type'] = 'application/json';
        evt.detail.body = JSON.stringify({
            query: query,
            top_k: topK
        });
    });
</script>
{% endblock %}
